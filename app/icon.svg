<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0f0f23"/>
  <!-- Stars -->
  <circle cx="4" cy="4" r="1" fill="white" opacity="0.8"/>
  <circle cx="28" cy="6" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="10" cy="26" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="26" cy="24" r="1" fill="white" opacity="0.5"/>
  <circle cx="20" cy="3" r="0.6" fill="white" opacity="0.9"/>
  <!-- Spaceship (pointing right) -->
  <polygon points="22,16 8,10 11,16 8,22" fill="#4CAF50" stroke="#2e7d32" stroke-width="0.5"/>
  <!-- Cockpit -->
  <circle cx="17" cy="16" r="2.5" fill="#1a1a2e" stroke="#4CAF50" stroke-width="0.8"/>
  <!-- Engine glow -->
  <ellipse cx="9" cy="16" rx="3" ry="1.5" fill="#ff8c00" opacity="0.8"/>
