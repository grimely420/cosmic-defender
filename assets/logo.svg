<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640" role="img" aria-label="Cosmic Defender logo">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#0b1030"/>
      <stop offset="55%" stop-color="#070a1e"/>
      <stop offset="100%" stop-color="#03040c"/>
    </radialGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4df3ff"/>
      <stop offset="100%" stop-color="#7a5cff"/>
    </linearGradient>
    <linearGradient id="shipFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eafcff"/>
      <stop offset="100%" stop-color="#9fd8ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="320" cy="320" r="308" fill="url(#bg)"/>
  <circle cx="320" cy="320" r="308" fill="none" stroke="url(#neon)" stroke-width="6" filter="url(#softGlow)"/>

  <!-- Starfield -->
  <g fill="#ffffff">
    <circle cx="150" cy="140" r="2.2" opacity="0.9"/>
    <circle cx="480" cy="110" r="1.6" opacity="0.7"/>
    <circle cx="530" cy="230" r="2.4" opacity="0.8"/>
    <circle cx="110" cy="300" r="1.5" opacity="0.6"/>
    <circle cx="200" cy="90"  r="1.4" opacity="0.7"/>
    <circle cx="420" cy="180" r="1.3" opacity="0.6"/>
    <circle cx="90"  cy="420" r="2.0" opacity="0.8"/>
    <circle cx="545" cy="400" r="1.5" opacity="0.7"/>
    <circle cx="360" cy="95"  r="1.8" opacity="0.8"/>
    <circle cx="250" cy="530" r="1.4" opacity="0.6"/>
    <circle cx="440" cy="500" r="1.9" opacity="0.7"/>
    <circle cx="160" cy="480" r="1.3" opacity="0.5"/>
  </g>

  <!-- Classic asteroids: jagged vector outlines -->
  <g fill="none" stroke="#8fa3c8" stroke-width="4" stroke-linejoin="round" opacity="0.95">
    <path d="M140 190 l38 -18 l34 10 l12 34 l-16 30 l-40 12 l-30 -22 l2 -46 z"/>
    <path d="M470 300 l30 -12 l26 8 l10 26 l-12 24 l-32 8 l-24 -16 l2 -38 z" opacity="0.8"/>
    <path d="M170 400 l24 -10 l22 6 l8 22 l-10 20 l-26 6 l-18 -14 l0 -30 z" opacity="0.7"/>
  </g>

  <!-- Laser shots -->
  <g stroke="url(#neon)" stroke-width="5" stroke-linecap="round" filter="url(#softGlow)">
    <line x1="320" y1="238" x2="320" y2="196"/>
    <line x1="320" y1="176" x2="320" y2="150"/>
  </g>

  <!-- The Defender ship: classic wireframe triangle, modern glow -->
  <g filter="url(#glow)">
    <path d="M320 250 L392 420 L320 385 L248 420 Z"
          fill="url(#shipFill)" fill-opacity="0.12"
          stroke="url(#neon)" stroke-width="8" stroke-linejoin="round"/>
    <!-- Thruster flame -->
    <path d="M300 412 L320 462 L340 412"
          fill="none" stroke="#ff9c3f" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g text-anchor="middle" font-family="'Orbitron','Audiowide','Eurostile',Futura,'Arial Black',sans-serif">
    <text x="320" y="530" font-size="52" font-weight="700" letter-spacing="10"
          fill="#eafcff" stroke="url(#neon)" stroke-width="1.5" filter="url(#softGlow)">COSMIC</text>
    <text x="320" y="582" font-size="40" font-weight="700" letter-spacing="16"
          fill="url(#neon)" filter="url(#softGlow)">DEFENDER</text>
  </g>
</svg>
